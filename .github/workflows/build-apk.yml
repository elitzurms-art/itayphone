name: Build Android APK

# Builds an installable debug APK in the cloud on every push (and on demand),
# so no local Linux / Android SDK setup is needed. When it finishes, download
# the APK from the run's "Artifacts" section, copy it to the phone and install
# (allow "install from unknown sources").
#
# First run is slow (~30-40 min: it downloads the Android SDK/NDK and compiles
# Python + Kivy for Android). Later runs reuse the cache and are much faster.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    # 22.04 still ships libtinfo5, which the Android NDK toolchain needs.
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 17
        # The Android Gradle plugin requires JDK 17; the runner defaults to 11.
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git zip unzip openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev build-essential ccache libltdl-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer "cython==0.29.36"

      - name: Cache Buildozer state
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      - name: Build the debug APK
        run: |
          export PATH=$PATH:$HOME/.local/bin
          yes | buildozer android debug

      - name: Upload the APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: itayphone-apk
          path: bin/*.apk
          if-no-files-found: error
